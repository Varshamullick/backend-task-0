version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: scalable-api-mongodb
    environment:
      MONGO_INITDB_DATABASE: scalable-api
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - scalable-api-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scalable-api-backend
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/scalable-api
      PORT: 5000
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: debug
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    networks:
      - scalable-api-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scalable-api-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - scalable-api-network
    command: npm start

volumes:
  mongodb_data:

networks:
  scalable-api-network:
    driver: bridge
